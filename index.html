<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Need for Speed - Web Edition</title>
    <style>
        /* Forces the game window to take up 100% of the screen with no borders */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #87ceeb; 
            font-family: sans-serif; 
        }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        /* Style for the Speedometer and HUD overlay text */
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            font-size: 24px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            pointer-events: none; 
            z-index: 10;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui">Loading assets...</div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
